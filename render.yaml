# ============================================================
#  PROJECT ATLAS — Render Blueprint
#  https://render.com/docs/blueprint-spec
# ============================================================

services:
  - type: web
    name: project-atlas
    runtime: python
    region: oregon          # free-tier region

    # ── Build & Start ───────────────────────────────────────
    buildCommand: |
      pip install -r requirements.txt &&
      pip uninstall -y torch torchvision torchaudio sentence-transformers transformers langchain-huggingface 2>/dev/null || true
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    # ── Health check ─────────────────────────────────────────
    healthCheckPath: /health

    # ── Environment Variables ────────────────────────────────
    envVars:
      # LLM keys — mark sync:false so Render prompts for the value
      # (never commit real keys here)
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

      # Model names (safe to commit)
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-5-20241022
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai/

      # Embedding model
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5

      # Data paths — relative to repo root (where Render runs from)
      - key: DATA_PATH
        value: data/Coursera.csv
      - key: REVIEWS_PATH
        value: data/reviews.csv
      - key: REVIEWS_BY_COURSE_PATH
        value: data/reviews_by_course.csv

      # FAISS index directory — relative to repo root
      - key: FAISS_INDEX_DIR
        value: indexes/faiss_store

      # Retrieval settings
      - key: TOP_K_RETRIEVAL
        value: "15"
      - key: MAX_REVIEWS_PER_COURSE
        value: "3"

      # Server
      - key: DEBUG
        value: "false"
